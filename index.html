<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Clases de Matemáticas - 1° Medio</title>
    
   <link rel="stylesheet" href="./style/style.css">

    <!-- MathJax - Solo una configuración -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async 
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="home-screen" class="home-container">
        <h1 class="title-main">Clases 1° Medio</h1>
        <div id="class-grid" class="class-grid"></div>
    </div>

    <!-- Pantalla Principal de la App -->
    <div id="app-screen" class="app-container hidden">
        <aside class="sidebar" id="sidebar">
            <h2 class="sidebar-title">Módulos</h2>
            <ul id="module-list" class="module-list"></ul>
        </aside>
        
        <main class="content-area">
            <div class="top-buttons">
                <button class="btn-toggle" onclick="volverAlInicio()">🏠 Volver al Menú</button>
                <button class="btn-toggle" onclick="toggleSidebar()">☰ Ocultar / Mostrar Módulos</button>
            </div>
            
            <div class="progress-container">
                <div id="bar" class="progress-bar"></div>
            </div>
            
            <h1 id="class-title"></h1>
            <div id="dynamic-body" class="dynamic-content"></div>
            
            <div class="navigation-buttons">
                <button class="btn" onclick="prevStep()">Anterior</button>
                <button class="btn btn-primary" onclick="nextStep()">Siguiente</button>
            </div>
        </main>
    </div>

    <!-- Botón flotante del Chat IA -->
    <button id="btn-toggle-chat" class="chat-toggle-btn" onclick="toggleChat()">
        💬 Tutor IA
    </button>

    <!-- Ventana del Chat IA -->
    <div id="ventana-chat-ia" class="chat-window hidden">
        <div class="chat-header">
            <h4>🤖 Tutor Matemático</h4>
            <button class="chat-close-btn" onclick="toggleChat()">✖</button>
        </div>
        
        <div id="chat-mensajes" class="chat-body">
            <div class="mensaje ia">
                ¡Hola! Soy tu tutor de IA. ¿En qué concepto matemático te puedo ayudar hoy?
            </div>
        </div>
        
        <div class="chat-footer">
            <input type="text" id="input-chat-ia" class="chat-input" 
                   placeholder="Escribe tu duda aquí..." 
                   onkeypress="manejarEnter(event)">
            <button onclick="enviarMensajeIA()" class="btn-enviar-chat">➤</button>
        </div>
    </div>

    <!-- Scripts - Orden correcto -->
    <script src="/main/content.js"></script>
    <script src="/main/main.js"></script>

</body>
</html>
