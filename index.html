<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Clases de Matemáticas</title>
    <link rel="stylesheet" href="/style/style.css">
    <script>
      MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
<script id="MathJax-script" async 
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
</head>
<body>

    <div id="home-screen" class="home-container">
        <h1 style="color: var(--accent); text-align: center; font-size: 3rem; margin-top: 50px;"> Clases 1° Medio</h1>
        <div id="class-grid" class="class-grid"></div>
    </div>

    <div id="app-screen" class="app-container hidden">
        <aside class="sidebar">
            <h2 style="color: var(--accent)">Módulos</h2>
            <ul id="module-list"></ul>
        </aside>
        
        <main class="content-area">
            <div style="display: flex; gap: 10px;">
                <button class="btn-toggle" onclick="volverAlInicio()">🏠 Volver al Menú</button>
                <button class="btn-toggle" onclick="toggleSidebar()">☰ Ocultar / Mostrar Módulos</button>
            </div>
            
            <div style="height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px;">
                <div id="bar" style="height: 100%; background: var(--primary); width: 0%; transition: 0.5s;"></div>
            </div>
            
            <h1 id="class-title"></h1>
            <div id="dynamic-body"></div>
            
            <div style="margin-top: auto; padding-top: 20px;">
                <button class="btn" onclick="prevStep()">Anterior</button>
                <button class="btn btn-primary" onclick="nextStep()">Siguiente</button>
            </div>
        </main>
    </div>
    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Plataforma de Matemáticas</title>
    
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <div id="app-container">
        </div>
    <button id="btn-toggle-chat" class="chat-toggle-btn" onclick="toggleChat()">
        💬 Tutor IA
    </button>

    <div id="ventana-chat-ia" class="chat-window hidden">
        <div class="chat-header">
            <h4>🤖 Tutor Matemático</h4>
            <button onclick="toggleChat()" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;">✖</button>
        </div>
        
        <div id="chat-mensajes" class="chat-body">
            <div class="mensaje ia">
                ¡Hola! Soy tu tutor de IA. ¿En qué concepto matemático te puedo ayudar hoy?
            </div>
        </div>
        
        <div class="chat-footer">
            <input type="text" id="input-chat-ia" placeholder="Escribe tu duda aquí..." onkeypress="manejarEnter(event)">
            <button onclick="enviarMensajeIA()" class="btn-enviar-chat">➤</button>
        </div>
    </div>
    
    <script src="main/main.js"></script>

</body>
</html>
    <script src="/main/main.js"></script>
    <script src="/main/content.js"></script>
</body>
</html>
